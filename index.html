<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Izzy Rip</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #060608;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(120, 90, 255, 0.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 85% 95%, rgba(50, 160, 255, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 85%, rgba(255, 80, 150, 0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Grid */
    /* .grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.12) 1px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 2px);
      background-size: 64px 64px;
      pointer-events: none;
    } */

    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Telegram Button */
    .btn-telegram {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      backdrop-filter: blur(4px) saturate(140%);
      -webkit-backdrop-filter: blur(4px) saturate(140%);
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
      overflow: hidden;
    }

    /* Glass reflection shine */
    .btn-telegram::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255, 255, 255, 0.03) 45%,
        rgba(255, 255, 255, 0.08) 50%,
        rgba(255, 255, 255, 0.03) 55%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn-telegram:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 
        0 0 30px rgba(120, 90, 255, 0.1);
    }

    .btn-telegram:hover::after {
      transform: translateX(100%);
    }

    .btn-telegram:active {
      transform: translateY(0);
    }

    .btn-telegram svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn-telegram:hover svg {
      transform: scale(1.1) rotate(-8deg);
    }

    /* Soft glow behind logo */
    .logo-wrap::before {
      content: "";
      position: absolute;
      width: 570px;
      height: 570px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(140, 110, 255, 0.15) 0%, transparent 70%);
      filter: blur(48px);
      animation: breathe 5s ease-in-out infinite alternate;
    }

    .logo-wrap img {
      width: 300px;
      height: auto;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 32px rgba(170, 140, 255, 0.3));
    }

    @keyframes breathe {
      from { transform: scale(0.92); opacity: 0.7; }
      to   { transform: scale(1.08); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="stage">
    <div class="logo-wrap">
      <img src="logo3.svg" alt="Logo" />
    </div>
    <a href="https://t.me/izdhan" class="btn-telegram" target="_blank">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.35-.01-1.02-.2-1.53-.36-.61-.2-1.1-.31-1.06-.65.02-.18.27-.36.75-.55 2.95-1.28 4.91-2.13 5.88-2.54 2.8-.1.58-.1 1.05-.1.1 0 .23.02.34.06.11.04.24.11.27.21.04.1.05.21.03.32z"/>
      </svg>
      Telegram
    </a>
  </div>
</body>
</html>
